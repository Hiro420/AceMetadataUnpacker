name: .NET Build + Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AceMetaUnpack.sln

      - name: Build
        run: dotnet build AceMetaUnpack.sln -c ${{ matrix.configuration }} --no-restore

      - name: Publish (self-contained)
        run: dotnet publish .\AceMetaUnpack\AceMetaUnpack.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o .\out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AceMetaUnpack-win-x64
          path: .\out\
